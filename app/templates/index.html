<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pips Solver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            touch-action: manipulation;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        label {
            font-weight: bold;
        }

        input[type="range"] {
            width: 160px;
        }

        #solve-btn {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #solve-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 8px;
            min-height: 1.4em;
            color: #555;
        }

        #solution-grid {
            display: inline-grid;
            border: 3px solid #222;
            margin-top: 16px;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            border: 1px solid #999;
            box-sizing: border-box;
            position: relative;
        }

        /* Erase the shared border between the two cells of a domino */
        .cell.h-first  { border-right: none; }
        .cell.h-second { border-left: none; }
        .cell.v-first  { border-bottom: none; }
        .cell.v-second { border-top: none; }

        .import-section {
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .import-section h2 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .import-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .import-controls select,
        .import-controls input[type="date"] {
            padding: 6px 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #import-btn {
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        #import-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #import-status {
            margin-top: 6px;
            font-size: 13px;
            color: #555;
            min-height: 1.3em;
        }

        #puzzle-info {
            margin-top: 6px;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Pips Solver</h1>

    <div class="import-section">
        <h2>Import from NYT</h2>
        <div class="import-controls">
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <input type="date" id="puzzle-date">
            <button id="import-btn">Import &amp; Solve</button>
        </div>
        <div id="import-status"></div>
        <div id="puzzle-info"></div>
    </div>

    <div class="controls">
        <label for="grid-size">Grid: <span id="grid-size-display">4×4</span></label>
        <input type="range" id="grid-size" min="0" max="3" step="1" value="1">
        <button id="solve-btn">Solve</button>
    </div>

    <div id="status"></div>
    <div id="solution-grid"></div>

    <script>
        const gridSizeInput = document.getElementById('grid-size');
        const gridSizeDisplay = document.getElementById('grid-size-display');
        const solveBtn = document.getElementById('solve-btn');
        const solutionGrid = document.getElementById('solution-grid');
        const statusEl = document.getElementById('status');

        // Set default date to today
        const importDateInput = document.getElementById('puzzle-date');
        importDateInput.value = new Date().toISOString().slice(0, 10);

        const importBtn = document.getElementById('import-btn');
        const importStatus = document.getElementById('import-status');
        const puzzleInfo = document.getElementById('puzzle-info');

        importBtn.addEventListener('click', async () => {
            const difficulty = document.getElementById('difficulty-select').value;
            const puzzleDate = importDateInput.value;

            importBtn.disabled = true;
            importStatus.textContent = 'Fetching puzzle from NYT…';
            puzzleInfo.textContent = '';
            solutionGrid.innerHTML = '';
            statusEl.textContent = '';

            try {
                const fetchResp = await fetch(
                    `/fetch-nyt?difficulty=${difficulty}&date=${puzzleDate}`
                );
                const puzzle = await fetchResp.json();

                if (puzzle.error) {
                    importStatus.textContent = `Error: ${puzzle.error}`;
                    return;
                }

                puzzleInfo.textContent =
                    `Puzzle #${puzzle.puzzle_id} · ${puzzle.print_date} · ${difficulty} · ` +
                    `${puzzle.domino_pool.length} domino${puzzle.domino_pool.length !== 1 ? 's' : ''}`;
                importStatus.textContent = 'Solving…';

                const solveResp = await fetch('/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        grid_size: puzzle.grid_size,
                        constraints: puzzle.constraints,
                        domino_pool: puzzle.domino_pool,
                        active_cells: puzzle.active_cells,
                    }),
                });
                const result = await solveResp.json();

                if (result.error) {
                    importStatus.textContent = `Solver error: ${result.error}`;
                } else if (result.solved) {
                    importStatus.textContent = 'Solution found!';
                    renderGrid(result.solution);
                } else {
                    importStatus.textContent = 'No solution found.';
                }
            } catch (err) {
                console.error(err);
                importStatus.textContent = 'Network error.';
            } finally {
                importBtn.disabled = false;
            }
        });

        const gridSizes = [3, 4, 5, 6];

        // 18 visually distinct pastel colours (enough for a 6×6 grid = 18 dominoes)
        const COLORS = [
            '#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#E8BAFF',
            '#FFB3E6', '#C9FFE5', '#FFD9BA', '#B3F0FF', '#DEB3FF', '#B3FFD9',
            '#FFCCE5', '#CCF5FF', '#FFE5CC', '#CCF5E6', '#F5CCFF', '#CCFFE5',
        ];

        gridSizeInput.addEventListener('input', () => {
            const n = gridSizes[gridSizeInput.value];
            gridSizeDisplay.textContent = `${n}×${n}`;
            solutionGrid.innerHTML = '';
            statusEl.textContent = '';
        });

        solveBtn.addEventListener('click', async () => {
            const sizeIndex = parseInt(gridSizeInput.value, 10);
            const gridSize = gridSizes[sizeIndex];

            solveBtn.disabled = true;
            statusEl.textContent = 'Solving…';
            solutionGrid.innerHTML = '';

            try {
                const response = await fetch('/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ grid_size: gridSize }),
                });

                const result = await response.json();

                if (result.error) {
                    statusEl.textContent = `Error: ${result.error}`;
                } else if (result.solved) {
                    statusEl.textContent = 'Solution found!';
                    renderGrid(result.solution);
                } else {
                    statusEl.textContent = result.message || 'No solution found.';
                }
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Network error. Is the server running?';
            } finally {
                solveBtn.disabled = false;
            }
        });

        function renderGrid(solution) {
            const numRows = solution.length;
            const numCols = solution[0].length;

            solutionGrid.style.gridTemplateColumns = `repeat(${numCols}, 60px)`;

            solution.forEach(row => {
                row.forEach(cell => {
                    const div = document.createElement('div');
                    div.classList.add('cell');

                    if (cell) {
                        div.textContent = cell.value;
                        div.style.background = COLORS[cell.domino_idx % COLORS.length];
                        div.title = `Domino ${cell.left}|${cell.right}`;

                        if (cell.orientation === 'horizontal') {
                            div.classList.add(cell.is_first ? 'h-first' : 'h-second');
                        } else {
                            div.classList.add(cell.is_first ? 'v-first' : 'v-second');
                        }
                    } else {
                        div.textContent = '?';
                        div.style.background = '#eee';
                    }

                    solutionGrid.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
